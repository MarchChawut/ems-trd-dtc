# ============================================
# Docker Compose สำหรับ EMS (Employee Management System)
# ใช้สำหรับรัน MariaDB บน Synology NAS หรือเครื่องอื่นๆ
#
# ❗ ก่อนรัน: copy .env.example เป็น .env แล้วใส่ค่าจริง
#    cp .env.example .env && nano .env
#
# จากนั้น: docker compose up -d
# ============================================

services:
  # ============================================
  # MariaDB Database
  # ============================================
  mariadb:
    image: mariadb:10.11
    container_name: ems-mariadb
    restart: unless-stopped
    environment:
      # ⚠️ ต้องตั้งค่าใน .env — ไม่มี default ที่ปลอดภัย จะ fail-fast ถ้าไม่ได้ตั้ง
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required in .env}
      MYSQL_DATABASE: ${DB_NAME:?DB_NAME is required in .env}
      MYSQL_USER: ${DB_USER:?DB_USER is required in .env}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required in .env}
    ports:
      # bind เฉพาะ localhost เพื่อความปลอดภัย (override ใน .env ถ้าจำเป็น)
      - "${DB_BIND_HOST:-127.0.0.1}:${DB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=100
    networks:
      - ems-network
    healthcheck:
      # ใช้ env var ของ container แทนการ inline password ใน compose
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root --password=\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # phpMyAdmin (Optional) — เฉพาะ admin profile
  #   ⚠️ ห้ามเปิดบน production — ใช้ SSH tunnel แทน
  #   เปิดเฉพาะตอน debug ด้วย: docker compose --profile admin up -d
  # ============================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: ems-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    ports:
      # localhost-only เสมอ — ห้าม expose สู่ network ภายนอก
      - "127.0.0.1:${PMA_PORT:-8080}:80"
    depends_on:
      - mariadb
    networks:
      - ems-network
    profiles:
      - admin

volumes:
  mariadb_data:
    driver: local

networks:
  ems-network:
    driver: bridge
